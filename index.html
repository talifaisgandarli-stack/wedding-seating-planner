<!DOCTYPE html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oturma Planı — Maket Gallery Hall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --gold: #b8860b;
        --gold-light: #d4a030;
        --dark: #141414;
        --dark2: #1e1e1e;
        --dark3: #2a2a2a;
        --bg: #f4f2ed;
        --surface: #fff;
        --border: #e8e4da;
        --text: #1a1a1a;
        --muted: #8a8a8a;
        --blue: #2a6f97;
        --pink: #c2528b;
        --green: #48bb78;
        --red: #e53e3e;
        --amber: #f6ad55;
        --radius: 10px;
        --radius-pill: 999px;
        --shadow-sm: 0 1px 4px rgba(0,0,0,.06);
        --shadow: 0 2px 12px rgba(0,0,0,.08);
        --shadow-md: 0 4px 20px rgba(0,0,0,.12);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); }
      #root { min-height: 100vh; }

      /* Slim scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.2); }

      /* Input & select */
      input, textarea, select { font-family: system-ui, -apple-system, sans-serif; }
      input:focus, textarea:focus {
        outline: none !important;
        border-color: var(--gold) !important;
        box-shadow: 0 0 0 3px rgba(184,134,11,.12) !important;
      }
      select:focus { outline: 2px solid var(--gold); outline-offset: 0; }

      /* Button interactions */
      button { transition: opacity .15s, transform .1s ease, background .15s, color .15s; }
      button:not(:disabled):hover { opacity: 0.88; }
      button:not(:disabled):active { transform: scale(0.96); }

      /* ── Mobile responsive ── */
      .mob-hide { display: none; }
      @media (min-width: 768px) {
        .mob-hide { display: revert; }
        .mob-only { display: none !important; }
        .mob-bottom-nav { display: none !important; }
        .mob-overlay { display: none !important; }
      }
      @media (max-width: 767px) {
        .left-panel {
          position: absolute !important;
          top: 0; left: 0; bottom: 0;
          z-index: 50;
          transform: translateX(-100%);
          transition: transform .22s cubic-bezier(.4,0,.2,1);
          width: 260px !important;
          box-shadow: 6px 0 32px rgba(0,0,0,.22) !important;
        }
        .left-panel.open { transform: translateX(0); }
        .right-panel { display: none !important; }
        .mob-overlay {
          position: absolute; inset: 0;
          background: rgba(0,0,0,.42);
          z-index: 40;
          cursor: pointer;
          backdrop-filter: blur(1px);
        }
        .mob-bottom-nav {
          display: flex !important;
          background: var(--dark);
          border-top: 1px solid var(--dark3);
          flex-shrink: 0;
          padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        .live-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
        .stats-grid { grid-template-columns: repeat(3, 1fr) !important; }
      }
      @media (max-width: 480px) {
        .live-grid { grid-template-columns: 1fr !important; }
      }
      @media (hover: none) {
        button { min-height: 40px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
